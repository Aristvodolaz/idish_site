services:
  # PostgreSQL Database (host 5433 to avoid conflict with local PostgreSQL on 5432)
  postgres:
    image: postgres:15-alpine
    container_name: ulpan-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: ivrit
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d ivrit']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ulpan-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: ulpan-meilisearch
    environment:
      MEILI_MASTER_KEY: ulpan-meilisearch-master-key-16bytes
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ulpan-backend
    environment:
      DATABASE_URL: postgresql://myuser:123456@postgres:5432/ivrit?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_REFRESH_EXPIRES_IN: 30d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ulpan-meilisearch-master-key-16bytes
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3010
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ulpan-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      PORT: 3010
    ports:
      - '3010:3010'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
